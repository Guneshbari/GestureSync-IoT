<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Control Dashboard</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for standard UI icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link to separated CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <!-- HEADER -->
        <header>
            <h1>Smart Control</h1>
            <h2>Home System</h2>
        </header>

        <!-- SYSTEM STATUS -->
        <div class="status-display" id="status-container">
            <div class="status-dot" id="status-indicator"></div>
            <span class="status-text" id="status-message">System Idle</span>
        </div>

        <!-- LIGHTING SECTION -->
        <div class="section">
            <div class="section-title">Lighting Space</div>
            <div class="lights-grid">
                
                <div class="card light-card" id="light-1" onclick="toggleLight(1)">
                    <div class="light-icon-wrapper">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                    <div class="card-label">Light 1</div>
                </div>
                
                <div class="card light-card" id="light-2" onclick="toggleLight(2)">
                    <div class="light-icon-wrapper">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                    <div class="card-label">Light 2</div>
                </div>
                
                <div class="card light-card" id="light-3" onclick="toggleLight(3)">
                    <div class="light-icon-wrapper">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                    <div class="card-label">Light 3</div>
                </div>

            </div>
        </div>

        <!-- APPLIANCES SECTION -->
        <div class="section">
            <div class="section-title">Appliances</div>
            <div class="card motor-card" id="motor-1" onclick="toggleMotor()">
                <div class="motor-card-left">
                    <div class="motor-icon-wrapper">
                        <i class="fa-solid fa-fan"></i>
                    </div>
                    <div class="card-label">Fan / Motor</div>
                </div>
                <!-- Interactive Toggle UI -->
                <div class="toggle-switch"></div>
            </div>
        </div>

        <!-- QUICK ACTIONS GRID -->
        <div class="section">
            <div class="section-title">Global Controls</div>
            <div class="global-controls">
                <button class="btn-global btn-on" onclick="setGlobalState(true)">
                    <i class="fa-solid fa-bolt"></i> All ON
                </button>
                <button class="btn-global btn-off" onclick="setGlobalState(false)">
                    <i class="fa-solid fa-power-off"></i> All OFF
                </button>
            </div>
        </div>

    </div> <!-- END DASHBOARD -->

    <!-- VOICE TRIGGER (Bottom Anchored) -->
    <div class="voice-section">
        <div class="mic-btn-wrapper">
            <div class="mic-btn" id="mic-trigger" onclick="toggleVoice()">
                <i class="fa-solid fa-microphone"></i>
            </div>
            <!-- Ripple layers for animation -->
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>
    </div>

    <!-- Link to separated JS -->
    <script src="script.js"></script>
</body>
</html>
